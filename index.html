<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AluminiumKing IMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0A0A0A;
  --bg-surface: #141414;
  --bg-elevated: #1A1A1A;
  --bg-interactive: #1E1E1E;
  --bg-hover: #252525;

  --border-subtle: #1E1E1E;
  --border-default: #2A2A2A;
  --border-strong: #404040;

  --text-primary: #EBEBEB;
  --text-secondary: #A0A0A0;
  --text-tertiary: #6B6B6B;

  --accent: #FF385C;
  --accent-dim: rgba(255, 56, 92, 0.06);
  --accent-glow: rgba(255, 56, 92, 0.12);

  --critical: #E8280B;
  --critical-dim: rgba(232, 40, 11, 0.07);
  --critical-border: rgba(232, 40, 11, 0.2);

  --warning: #FF8C00;
  --warning-dim: rgba(255, 140, 0, 0.07);
  --warning-border: rgba(255, 140, 0, 0.2);

  --healthy: #00A048;
  --healthy-dim: rgba(0, 160, 72, 0.07);
  --healthy-border: rgba(0, 160, 72, 0.2);

  --transit: #0070D2;
  --transit-dim: rgba(0, 112, 210, 0.07);
  --transit-border: rgba(0, 112, 210, 0.2);

  --font-body: 'Plus Jakarta Sans', sans-serif;
  --font-mono: 'Plus Jakarta Sans', sans-serif;
  --font-display: 'Plus Jakarta Sans', sans-serif;
  --font-condensed: 'Plus Jakarta Sans', sans-serif;

  --sidebar-width: 232px;
  --header-height: 56px;
  --tr: 140ms ease;

  --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.07), 0 0 0 1px rgba(0, 0, 0, 0.03);
  --shadow-modal: 0 8px 40px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
  --radius-card: 12px;
  --radius-btn: 8px;
  --radius-input: 8px;
  --radius-badge: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ────────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-surface);
  border-right: 1px solid var(--border-default);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border-default);
}

.logo-mark {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  line-height: 1.1;
}

.logo-mark span { color: var(--accent); }

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.01em;
  color: var(--text-tertiary);
  margin-top: 3px;
}

.nav-section { padding: 16px 0 2px; }

.nav-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding: 0 18px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  cursor: pointer;
  transition: all var(--tr);
  border-left: 3px solid transparent;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  user-select: none;
  margin: 1px 0;
}

.nav-item:hover {
  background: #FFF5F7;
  color: var(--text-primary);
}

.nav-item.active {
  background: #FFF5F7;
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

.nav-icon {
  font-size: 13px;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
  opacity: 0.75;
}

.nav-item.active .nav-icon { opacity: 1; }

.nav-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: var(--radius-badge);
  letter-spacing: 0.02em;
}

.sidebar-footer {
  margin-top: auto;
  padding: 14px 18px;
  border-top: 1px solid var(--border-default);
}

.user-chip { display: flex; align-items: center; gap: 10px; }

.user-avatar {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

.user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }

.user-role {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-tertiary);
  margin-top: 1px;
}

/* ── MAIN ───────────────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: var(--header-height);
  min-height: var(--header-height);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 12px;
}

.page-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

.content { flex: 1; overflow-y: auto; padding: 24px 28px; }

/* ── BUTTONS ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--tr);
  border-radius: var(--radius-btn);
  letter-spacing: 0;
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
  border-color: var(--border-strong);
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn-primary:hover {
  background: #E8284E;
  border-color: #E8284E;
  color: #fff;
}

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-secondary);
}

.btn-ghost:hover {
  background: var(--bg-interactive);
  border-color: var(--border-default);
}

.btn-sm {
  padding: 5px 12px;
  font-size: 12px;
}

.btn-danger {
  border-color: var(--critical-border);
  color: var(--critical);
  background: transparent;
}

.btn-danger:hover { background: var(--critical-dim); }

/* ── CARDS ──────────────────────────────────────────────────────────────── */
.card {
  background: var(--bg-surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  border: none;
}

.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.card-action {
  margin-left: auto;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
}

.card-action:hover { text-decoration: underline; }

/* ── STAT CARDS ─────────────────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--bg-surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  border-left: 4px solid transparent;
}

.stat-card.critical { border-left-color: var(--critical); }
.stat-card.warning  { border-left-color: var(--warning); }
.stat-card.healthy  { border-left-color: var(--healthy); }
.stat-card.transit  { border-left-color: var(--transit); }

.stat-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.stat-value {
  font-size: 40px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
}

.stat-card.critical .stat-value { color: var(--critical); }
.stat-card.warning  .stat-value { color: var(--warning); }
.stat-card.healthy  .stat-value { color: var(--healthy); }
.stat-card.transit  .stat-value { color: var(--transit); }

.stat-desc {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 5px;
  font-weight: 400;
}

/* ── TABLES ─────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border-default);
  white-space: nowrap;
  background: var(--bg-elevated);
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
  color: var(--text-primary);
}

tr:last-child td { border-bottom: none; }

tbody tr:hover td {
  background: #FAFAFA;
  cursor: pointer;
}

.td-sku {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.02em;
}

.td-num {
  font-size: 13px;
  font-weight: 700;
  text-align: right;
  color: var(--text-primary);
}

.td-unit {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-left: 2px;
  font-weight: 500;
}

.td-center {
  text-align: center;
}

th.td-center {
  text-align: center;
}

/* ── PRODUCT IMAGE ──────────────────────────────────────────────────────── */
.product-img {
  width: 50px;
  height: 50px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border-default);
  background: var(--bg-elevated);
}

/* ── BADGES ─────────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: var(--radius-badge);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  border: none;
}

.badge-critical  { background: var(--critical-dim);  color: var(--critical); }
.badge-warning   { background: var(--warning-dim);   color: var(--warning); }
.badge-healthy   { background: var(--healthy-dim);   color: var(--healthy); }
.badge-transit   { background: var(--transit-dim);   color: var(--transit); }
.badge-draft     { background: #F2F2F2;               color: var(--text-tertiary); }
.badge-sent      { background: rgba(118, 75, 210, 0.08); color: #7c5cbf; }
.badge-received  { background: var(--healthy-dim);   color: var(--healthy); }
.badge-cancelled { background: #F2F2F2;               color: var(--text-tertiary); }
.badge-disc      { background: var(--critical-dim);  color: var(--critical); }
.badge-pending   { background: var(--warning-dim);   color: var(--warning); }
.badge-approved  { background: var(--transit-dim);   color: var(--transit); }
.badge-issued    { background: var(--healthy-dim);   color: var(--healthy); }
.badge-active    { background: var(--healthy-dim);   color: var(--healthy); }

/* ── STATUS PILL (replaces dot) ─────────────────────────────────────────── */
.sdot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

.sdot.critical { background: var(--critical); }
.sdot.warning  { background: var(--warning); }
.sdot.healthy  { background: var(--healthy); }
.sdot.transit  { background: var(--transit); }

/* ── SEARCH / FILTERS ───────────────────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-subtle);
}

.search-input {
  flex: 1;
  background: var(--bg-interactive);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-input);
  padding: 8px 14px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 400;
  outline: none;
  transition: border-color var(--tr), box-shadow var(--tr);
}

.search-input::placeholder { color: var(--text-tertiary); }

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
  background: #fff;
}

.sel {
  background: var(--bg-interactive);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-input);
  padding: 8px 12px;
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  outline: none;
  cursor: pointer;
  transition: border-color var(--tr);
}

.sel:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

option { background: #fff; }

/* ── STOCK BAR ──────────────────────────────────────────────────────────── */
.bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }

.bar-track {
  flex: 1;
  height: 4px;
  background: var(--border-default);
  border-radius: 4px;
  overflow: hidden;
}

.bar-fill { height: 100%; border-radius: 4px; }
.bar-fill.critical { background: var(--critical); }
.bar-fill.warning  { background: var(--warning); }
.bar-fill.healthy  { background: var(--healthy); }

/* ── GRID ───────────────────────────────────────────────────────────────── */
.page { display: flex; flex-direction: column; gap: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.span-2 { grid-column: span 2; }

/* ── LIST ITEMS ─────────────────────────────────────────────────────────── */
.list-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-subtle);
  transition: background var(--tr);
}

.list-item:hover { background: var(--bg-elevated); }
.list-item:last-child { border-bottom: none; }

.li-sku {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  min-width: 90px;
  letter-spacing: 0.02em;
}

.li-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }

.li-meta {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.li-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }

/* ── MODAL ──────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 24px;
  backdrop-filter: blur(2px);
}

.modal, .modal-dialog {
  background: var(--bg-surface);
  border-radius: 16px;
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-modal);
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border-default);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.modal-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.modal-close, .close-btn {
  background: var(--bg-interactive);
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 8px 10px;
  border-radius: 6px;
  transition: all var(--tr);
  flex-shrink: 0;
}

.modal-close:hover, .close-btn:hover {
  background: var(--border-default);
  color: var(--text-primary);
}

.modal-body { padding: 22px 24px; overflow-y: auto; flex: 1; }

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
}

.field-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}

/* ── FORMS ──────────────────────────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.span-2 { grid-column: span 2; }

.form-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.form-input, .form-sel, .form-ta {
  background: #fff;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-input);
  padding: 9px 12px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 400;
  outline: none;
  transition: border-color var(--tr), box-shadow var(--tr);
  width: 100%;
}

.form-input:focus, .form-sel:focus, .form-ta:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.form-ta { resize: vertical; min-height: 64px; }

.form-divider {
  grid-column: span 2;
  border: none;
  border-top: 1px solid var(--border-default);
  margin: 4px 0;
}

/* ── INLINE LINE ITEMS ──────────────────────────────────────────────────── */
.li-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 8px;
}

.li-table th {
  font-size: 10px;
  color: var(--text-tertiary);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border-default);
  background: var(--bg-elevated);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.li-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border-subtle);
}

.li-table .fi {
  padding: 6px 9px;
  font-size: 12px;
  font-family: var(--font-body);
  background: #fff;
  border: 1px solid var(--border-default);
  border-radius: 6px;
  color: var(--text-primary);
  width: 90px;
  transition: border-color var(--tr);
}

.li-table .fi:focus {
  border-color: var(--accent);
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-dim);
}

/* ── AVAIL CHECK ────────────────────────────────────────────────────────── */
.avail-result {
  background: var(--bg-surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  margin-bottom: 14px;
  overflow: hidden;
}

.avail-head {
  padding: 14px 18px;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 12px;
}

.avail-metrics { display: grid; grid-template-columns: repeat(4, 1fr); }

.avail-metric {
  padding: 16px 18px;
  border-right: 1px solid var(--border-subtle);
}

.avail-metric:last-child { border-right: none; }

.aml {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-tertiary);
  margin-bottom: 5px;
}

.amv {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.amu {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: 3px;
  font-weight: 500;
}

/* ── PAGINATION ─────────────────────────────────────────────────────────── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-top: 1px solid var(--border-subtle);
}

.pg-info { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }

.pg-btns { display: flex; gap: 4px; }

.pg-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-interactive);
  border: 1px solid var(--border-default);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  transition: all var(--tr);
  font-family: var(--font-body);
}

.pg-btn:hover, .pg-btn.act {

<body>
<div class="app">
  <!-- Content will be dynamically loaded based on authentication status -->
</div>

<div id="modal-root"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const DB = {
  products: [],
  pos: [],
  requisitions: [],
  transactions: [],
  jobOrders: [],
};

// ─── API CLIENT ──────────────────────────────────────────────────────────────

const API_BASE = window.location.origin;

async function fetchAPI(endpoint) {
  try {
    const response = await fetch(`${API_BASE}${endpoint}`, { credentials: 'include' });

    // If unauthorized, redirect to login
    if (response.status === 401) {
      console.warn('Unauthorized access, redirecting to login...');
      S.isAuthenticated = false;
      S.user = null;
      showLoginScreen();
      return [];
    }

    if (!response.ok) throw new Error(`API error: ${response.status}`);
    return await response.json();
  } catch (error) {
    console.error(`Failed to fetch ${endpoint}:`, error);
    return [];
  }
}

async function loadData() {
  const [products, pos, requisitions, transactions, jobOrders, suppliers] = await Promise.all([
    fetchAPI('/api/products'),
    fetchAPI('/api/purchase-orders'),
    fetchAPI('/api/requisitions'),
    fetchAPI('/api/transactions'),
    fetchAPI('/api/job-orders'),
    fetchAPI('/api/suppliers'),
  ]);

  // Convert string numbers to actual numbers for products
  DB.products = products.map(p => ({
    ...p,
    current: parseFloat(p.current) || 0,
    allocated: parseFloat(p.allocated) || 0,
    par: parseFloat(p.par) || 0,
    reorder: parseFloat(p.reorder) || 0,
    lead: parseInt(p.lead) || 0
  }));

  // Convert numbers in PO items
  DB.pos = pos.map(po => ({
    ...po,
    items: po.items.map(i => ({
      ...i,
      ordered: parseFloat(i.ordered) || 0,
      received: parseFloat(i.received) || 0
    }))
  }));

  // Convert numbers in requisition items
  DB.requisitions = requisitions.map(req => ({
    ...req,
    items: req.items.map(i => ({
      ...i,
      req: parseFloat(i.req) || 0,
      issued: parseFloat(i.issued) || 0
    }))
  }));

  // Convert numbers in transactions
  DB.transactions = transactions.map(tx => ({
    ...tx,
    qty: parseFloat(tx.qty) || 0,
    before: parseFloat(tx.before) || 0,
    after: parseFloat(tx.after) || 0
  }));

  // Job orders already have numbers converted
  DB.jobOrders = jobOrders;

  // Store suppliers
  DB.suppliers = suppliers;

  // Load users if super admin
  if (S.user && S.user.role === 'super_admin') {
    const usersResponse = await fetch('/api/users', { credentials: 'include' });
    if (usersResponse.ok) {
      S.users = await usersResponse.json();
    }
  }
}

// ─── STATE ───────────────────────────────────────────────────────────────────

const S = {
  view: 'dashboard',
  search: '',
  catFilter: 'all',
  statusFilter: 'all',
  supplierFilter: 'all',
  poStatusFilter: 'all',
  poView: 'kanban',
  availSearch: '',
  grnPO: null,
  newPOItems: [{sku:'',name:'',qty:'',eta:''}],
  user: null,
  isAuthenticated: false
};

// ─── UTILS ───────────────────────────────────────────────────────────────────

function stockStatus(p) {
  if(p.current === 0) return 'critical';
  if(p.current < p.par) return p.current < p.par * 0.5 ? 'critical' : 'warning';
  return 'healthy';
}
function available(p){return Math.max(0,p.current - p.allocated);}
function fmtQty(n,uom){return `<span class="td-num">${n%1===0?n:n.toFixed(1)}</span><span class="td-unit">${uom}</span>`;}
function fmtDate(s){if(!s)return '—';const d=new Date(s);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function printReport(){
  // Add print date to all cards before printing
  const cards = document.querySelectorAll('.card');
  const now = new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  cards.forEach(card => card.setAttribute('data-print-date', now));
  window.print();
}

function exportToExcel(reportType){
  let data = [];
  let filename = '';
  const timestamp = new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}).replace(/[,:]/g,'-');

  switch(reportType){
    case 'stock-status':
      filename = `Stock_Status_Report_${timestamp}.xlsx`;
      const crit = criticalAlerts();
      const warn = warningAlerts();
      const healthy = DB.products.filter(p=>stockStatus(p)==='healthy');
      const allProducts = [...crit, ...warn, ...healthy];
      data = allProducts.map(p=>{
        const avail = available(p);
        const status = stockStatus(p);
        return {
          'Status': status === 'critical' ? '🔴 Critical' : status === 'warning' ? '⚠️ Warning' : '✅ Healthy',
          'SKU': p.sku,
          'Product': p.name,
          'Category': p.category,
          'Current Stock': parseFloat(p.current),
          'Allocated': parseFloat(p.allocated),
          'Available': parseFloat(avail),
          'Par Level': parseFloat(p.par),
          'UOM': p.uom,
          'Supplier': p.supplier
        };
      });
      break;

    case 'incoming-stock':
      filename = `Incoming_Stock_Report_${timestamp}.xlsx`;
      const inTransitPOs = DB.pos.filter(po=>po.status==='in_transit');
      data = inTransitPOs.flatMap(po=>{
        return po.items.map(item=>{
          const outstanding = parseFloat(item.ordered) - parseFloat(item.received);
          return {
            'PO Number': po.id,
            'Supplier': po.supplier,
            'Expected Date': po.exp,
            'SKU': item.sku,
            'Product': item.name,
            'Ordered': parseFloat(item.ordered),
            'Received': parseFloat(item.received),
            'Outstanding': outstanding,
            'UOM': item.uom
          };
        });
      });
      break;

    case 'stock-movement':
      filename = `Stock_Movement_Report_${timestamp}.xlsx`;
      const from = new Date(S.movementDateFrom);
      const to = new Date(S.movementDateTo);
      let filtered = DB.transactions.filter(t=>{
        const td = new Date(t.date);
        return td >= from && td <= to;
      });
      if(S.movementType !== 'all'){
        const typeMap = {in:['purchase_receipt'],out:['material_issue'],adjustment:['stock_adjustment_in','stock_adjustment_out']};
        filtered = filtered.filter(t=>typeMap[S.movementType]?.includes(t.type));
      }
      data = filtered.map(t=>{
        const product = DB.products.find(p=>p.sku===t.sku);
        return {
          'Date': t.date,
          'Transaction Type': t.type.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase()),
          'SKU': t.sku,
          'Product': product?.name || t.sku,
          'Quantity': parseFloat(t.qty),
          'UOM': product?.uom || '',
          'Reference': t.ref || '',
          'Notes': t.notes || ''
        };
      });
      break;

    case 'slow-moving':
      filename = `Slow_Moving_Stock_Report_${timestamp}.xlsx`;
      const cutoffDate = new Date();
      cutoffDate.setDate(cutoffDate.getDate() - S.slowMovingDays);
      const slowMoving = DB.products.filter(p=>{
        const lastTrans = DB.transactions.filter(t=>t.sku===p.sku).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        if(!lastTrans) return true;
        return new Date(lastTrans.date) < cutoffDate;
      });
      data = slowMoving.map(p=>{
        const lastTrans = DB.transactions.filter(t=>t.sku===p.sku).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        const daysSinceMovement = lastTrans ? Math.floor((Date.now()-new Date(lastTrans.date))/(1000*60*60*24)) : 365;
        return {
          'SKU': p.sku,
          'Product': p.name,
          'Category': p.category,
          'Current Stock': parseFloat(p.current),
          'Days Since Movement': daysSinceMovement > 365 ? '365+' : daysSinceMovement,
          'Last Transaction': lastTrans ? lastTrans.date : 'Never',
          'UOM': p.uom,
          'Supplier': p.supplier
        };
      });
      break;

    case 'low-stock':
      filename = `Low_Stock_Alerts_Report_${timestamp}.xlsx`;
      const critItems = criticalAlerts();
      const warnItems = warningAlerts();
      const lowStock = [...critItems, ...warnItems];
      data = lowStock.map(p=>{
        const avail = available(p);
        const status = stockStatus(p);
        const orderQty = Math.max(0, p.par - avail);
        return {
          'Alert Level': status === 'critical' ? '🔴 Critical' : '⚠️ Warning',
          'SKU': p.sku,
          'Product': p.name,
          'Category': p.category,
          'Current Stock': parseFloat(p.current),
          'Allocated': parseFloat(p.allocated),
          'Available': parseFloat(avail),
          'Par Level': parseFloat(p.par),
          'Recommended Order': orderQty,
          'UOM': p.uom,
          'Supplier': p.supplier
        };
      });
      break;
  }

  if(data.length === 0){
    alert('No data to export');
    return;
  }

  // Create worksheet
  const ws = XLSX.utils.json_to_sheet(data);

  // Auto-size columns
  const colWidths = Object.keys(data[0]).map(key => {
    const maxLen = Math.max(
      key.length,
      ...data.map(row => String(row[key]).length)
    );
    return { wch: Math.min(maxLen + 2, 50) };
  });
  ws['!cols'] = colWidths;

  // Create workbook
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Report');

  // Download
  XLSX.writeFile(wb, filename);
}
function poBadge(s){
  const map={draft:'badge-draft',sent:'badge-sent',in_transit:'badge-transit',partially_received:'badge-warning',fully_received:'badge-received',cancelled:'badge-cancelled'};
  const label={draft:'Draft',sent:'Sent',in_transit:'In-Transit',partially_received:'Partial',fully_received:'Received',cancelled:'Cancelled'};
  return `<span class="badge ${map[s]||'badge-draft'}">${label[s]||s}</span>`;
}
function reqBadge(s){
  const map={pending:'badge-pending',approved:'badge-approved',issued:'badge-issued',cancelled:'badge-cancelled'};
  const label={pending:'Pending',approved:'Approved',issued:'Issued',cancelled:'Cancelled'};
  return `<span class="badge ${map[s]||'badge-draft'}">${label[s]||s}</span>`;
}
function inTransitForSKU(sku){
  return DB.pos.filter(p=>p.status==='in_transit'||p.status==='sent').flatMap(p=>p.items.filter(i=>i.sku===sku).map(i=>({...i,po:p.id,eta:i.eta,supplier:p.supplier})));
}
function criticalAlerts(){return DB.products.filter(p=>stockStatus(p)==='critical');}
function warningAlerts(){return DB.products.filter(p=>stockStatus(p)==='warning');}
function lowStockProducts(){return DB.products.filter(p=>stockStatus(p)==='critical' || stockStatus(p)==='warning');}
function inTransitPOs(){return DB.pos.filter(p=>p.status==='in_transit');}
function pendingReqs(){return DB.requisitions.filter(r=>r.status==='pending');}

const NAV = [
  {id:'dashboard',label:'Dashboard',icon:'⬚',section:null,roles:['super_admin','purchaser','stock_keeper','production']},
  {section:'Inventory',roles:['super_admin','purchaser','stock_keeper','production']},
  {id:'inventory',label:'Products',icon:'◧',roles:['super_admin','purchaser','stock_keeper','production']},
  {id:'transactions',label:'Transactions',icon:'↕',roles:['super_admin','purchaser','stock_keeper','production']},
  {section:'Procurement',roles:['super_admin','purchaser','stock_keeper']},
  {id:'purchase-orders',label:'Purchase Orders',icon:'☰',roles:['super_admin','purchaser','stock_keeper']},
  {id:'receiving',label:'Stock Receiving',icon:'↙',roles:['super_admin','stock_keeper']},
  {section:'Production',roles:['super_admin','production','stock_keeper']},
  {id:'job-orders',label:'Job Orders',icon:'◫',roles:['super_admin','production']},
  {id:'requisitions',label:'Requisitions',icon:'◈',roles:['super_admin','production','stock_keeper']},
  {id:'availability',label:'Availability Check',icon:'◎',roles:['super_admin','purchaser','stock_keeper','production']},
  {section:'Reports',roles:['super_admin','purchaser','stock_keeper','production']},

  {id:'suppliers',label:'Suppliers',icon:'🏢',roles:['super_admin']},
  {id:'users',label:'User Management',icon:'👤',roles:['super_admin']},
];

function canAccess(roles) {
  if (!S.user) return false;
  if (S.user.role === 'super_admin') return true;
  return roles && roles.includes(S.user.role);
}

function renderNav(){
  const crit = criticalAlerts().length;
  const warn = warningAlerts().length;
  const lowStock = lowStockProducts().length;
  const pend = pendingReqs().length;
  const draftPOs = DB.pos.filter(p=>p.status==='draft').length;
  const inTransit = DB.pos.filter(p=>p.status==='in_transit').length;
  const ongoingJobs = DB.jobOrders.filter(j=>j.status==='ongoing').length;

  const badges = {
    dashboard: crit + pend,
    inventory: lowStock,
    'purchase-orders': draftPOs,
    receiving: inTransit,
    'job-orders': ongoingJobs,
    requisitions: pend
  };
  let html = '';
  let inSection = false;
  let sectionVisible = false;

  NAV.forEach(n=>{
    if(n.section){
      // Check if any items in this section are accessible
      sectionVisible = NAV.filter(item => !item.section && canAccess(item.roles)).some(item => {
        const sectionIndex = NAV.findIndex(s => s.section === n.section);
        const nextSectionIndex = NAV.findIndex((s, i) => i > sectionIndex && s.section);
        const itemIndex = NAV.indexOf(item);
        return itemIndex > sectionIndex && (nextSectionIndex === -1 || itemIndex < nextSectionIndex);
      });

      if(sectionVisible && canAccess(n.roles)){
        html+=`<div class="nav-section"><div class="nav-label">${n.section}</div>`;
        inSection=true;
      }
    } else {
      if(canAccess(n.roles)){
        const badge = badges[n.id]?`<span class="nav-badge">${badges[n.id]}</span>`:'';
        html+=`<div class="nav-item${S.view===n.id?' active':''}" data-nav="${n.id}">
          <span class="nav-icon">${n.icon}</span>${n.label}${badge}
        </div>`;
      }
    }
  });
  const navContent = document.getElementById('nav-content');
  if (navContent) {
    navContent.innerHTML = html;
    renderUserInfo();
  }
}

function renderUserInfo() {
  if (!S.user) return;

  const roleLabels = {
    super_admin: 'Super Admin',
    purchaser: 'Purchaser',
    stock_keeper: 'Stock Keeper',
    production: 'Production'
  };

  const initials = S.user.full_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

  document.getElementById('sidebar-footer').innerHTML = `
    <div class="user-chip" style="cursor:pointer;position:relative" onclick="toggleUserMenu(event)">
      <div class="user-avatar">${initials}</div>
      <div style="flex:1">
        <div class="user-name">${S.user.full_name}</div>
        <div class="user-role">${roleLabels[S.user.role] || S.user.role}</div>
      </div>
      <div style="font-size:10px;color:var(--text-tertiary)">▼</div>
    </div>
    <div id="user-menu" style="display:none;position:absolute;bottom:72px;left:8px;right:8px;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--radius-card);box-shadow:var(--shadow-lg);z-index:1000">
      <div style="padding:8px 0">
        <div class="nav-item" onclick="logout()">
          <span class="nav-icon">⎋</span>Logout
        </div>
      </div>
    </div>
  `;
}

function toggleUserMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('user-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

// Close user menu when clicking outside
document.addEventListener('click', () => {
  const menu = document.getElementById('user-menu');
  if(menu) menu.style.display = 'none';
});

function navigate(view){
  S.view=view;
  S.search='';
  S.catFilter='all';
  S.statusFilter='all';
  renderNav();
  renderTopbar();
  renderContent();
}

function renderTopbar(){
  const titles={dashboard:'Dashboard',inventory:'Products & Inventory','purchase-orders':'Purchase Orders',receiving:'Stock Receiving','job-orders':'Job Orders',requisitions:'Requisitions',availability:'Availability Check',transactions:'Transaction Log',reports:'Reports',suppliers:'Supplier Management',users:'User Management'};
  const pageTitle = document.getElementById('page-title');
  if (pageTitle) {
    pageTitle.textContent = titles[S.view]||S.view;
  }

  // Role-based action buttons
  const actions={};

  if (canAccess(['super_admin', 'purchaser'])) {
    actions.inventory = `<button class="btn btn-primary btn-sm" onclick="showAddProduct()">+ Add Product</button>`;
  }

  if (canAccess(['super_admin', 'purchaser'])) {
    actions['purchase-orders'] = `<button class="btn btn-primary btn-sm" onclick="showCreatePO()">+ New PO</button>`;
  }

  if (canAccess(['super_admin', 'production'])) {
    actions['job-orders'] = `<button class="btn btn-primary btn-sm" onclick="showCreateJob()">+ New Job</button>`;
  }

  if (canAccess(['super_admin', 'production', 'stock_keeper'])) {
    actions.requisitions = `<button class="btn btn-primary btn-sm" onclick="showCreateReq()">+ New Requisition</button>`;
  }

  if (canAccess(['super_admin'])) {
    actions.suppliers = `<button class="btn btn-primary btn-sm" onclick="showAddSupplier()">+ Add Supplier</button>`;
    actions.users = `<button class="btn btn-primary btn-sm" onclick="showAddUser()">+ Add User</button>`;
  }

  const topbarActions = document.getElementById('topbar-actions');
  if (topbarActions) {
    topbarActions.innerHTML = actions[S.view]||'';
  }
}

function renderContent(){
  const views={
    dashboard:renderDashboard,
    inventory:renderInventory,
    'purchase-orders':renderPOs,
    receiving:renderReceiving,
    'job-orders':renderJobOrders,
    requisitions:renderRequisitions,
    availability:renderAvailability,
    transactions:renderTransactions,
    reports:renderReports,
    suppliers:renderSuppliers,
    users:renderUsers,
  };
  document.getElementById('content').innerHTML = (views[S.view]||renderDashboard)();
  bindEvents();
}

function renderInventory(){
  let prods = DB.products;
  if(S.search) prods = prods.filter(p=>p.sku.toLowerCase().includes(S.search.toLowerCase())||p.name.toLowerCase().includes(S.search.toLowerCase()));
  if(S.catFilter!=='all') prods = prods.filter(p=>p.cat===S.catFilter);
  if(S.supplierFilter!=='all') prods = prods.filter(p=>p.supplier===S.supplierFilter);
  if(S.statusFilter!=='all') prods = prods.filter(p=>{
    if(S.statusFilter==='critical') return stockStatus(p)==='critical';
    if(S.statusFilter==='warning') return stockStatus(p)==='warning';
    if(S.statusFilter==='healthy') return stockStatus(p)==='healthy';
    if(S.statusFilter==='discontinued') return p.status==='discontinued';
    return true;
  });

  const cats = [...new Set(DB.products.map(p=>p.cat))];

  // Get suppliers sorted by SKU count (descending)
  const supplierCounts = DB.products.reduce((acc, p) => {
    acc[p.supplier] = (acc[p.supplier] || 0) + 1;
    return acc;
  }, {});
  const suppliers = Object.entries(supplierCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([supplier]) => supplier);

  // Group products by supplier
  const groupedBySupplier = {};
  prods.forEach(p => {
    if (!groupedBySupplier[p.supplier]) {
      groupedBySupplier[p.supplier] = [];
    }
    groupedBySupplier[p.supplier].push(p);
  });

  // Render rows grouped by supplier (sorted by SKU count)
  const rows = suppliers.flatMap(supplier => {
    const supplierProds = groupedBySupplier[supplier] || [];
    if (supplierProds.length === 0) return [];

    const supplierRow = `<tr class="supplier-row">
      <td colspan="10" style="background:var(--bg-elevated);padding:10px 16px;font-weight:700;font-size:13px;color:var(--text-primary);border-top:2px solid var(--border-default)">
        ${supplier} <span style="font-weight:500;color:var(--text-tertiary);margin-left:8px">(${supplierProds.length} SKUs)</span>
      </td>
    </tr>`;

    const productRows = supplierProds.map(p=>{
    const s = stockStatus(p);
    const avail = available(p);
    const pct = p.par>0?Math.min(100,(p.current/p.par)*100):100;
    const disc = p.status==='discontinued'?`<span class="badge badge-disc" style="margin-left:6px">Disc.</span>`:'';
    // find in-transit
    const transit = inTransitForSKU(p.sku);
    const transitTxt = transit.length?`<div style="font-family:var(--font-mono);font-size:9px;color:var(--transit);margin-top:2px">📦 +${transit.reduce((a,i)=>a+i.ordered,0)} ${p.uom} ETA ${fmtDate(transit[0].eta)}</div>`:'';

    const defaultImg = '/images/default-product.svg';
    const imageUrl = p.image_url || defaultImg;

    return `<tr data-sku="${p.sku}">
      <td><span class="sdot ${s}"></span></td>
      <td><img src="${imageUrl}" alt="${p.name}" class="product-img" onerror="if(this.src!=='${defaultImg}')this.src='${defaultImg}'"></td>
      <td class="td-sku">${p.sku}</td>
      <td><div>${p.name}${disc}</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary)">${p.cat} · ${p.sub} · Rack ${p.rack}</div></td>
      <td>${fmtQty(p.current,p.uom)}</td>
      <td>${fmtQty(p.allocated,p.uom)}</td>
      <td>
        ${fmtQty(avail,p.uom)}
        ${transitTxt}
        <div class="bar-wrap" style="margin-top:4px">
          <div class="bar-track"><div class="bar-fill ${s}" style="width:${pct}%"></div></div>
          <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary)">${Math.round(pct)}%</span>
        </div>
      </td>
      <td>${fmtQty(p.par,p.uom)}</td>
      <td style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)">${p.supplier}</td>
      <td>${canAccess(['super_admin', 'purchaser']) ? `<button class="btn btn-sm" onclick="showEditProduct('${p.sku}',event)" style="font-size:10px;padding:4px 8px">Edit</button>` : ''}</td>
    </tr>`;
    });

    return [supplierRow, ...productRows];
  }).join('');

  return `<div class="card">
    <div class="toolbar">
      <input class="search-input" placeholder="Search SKU or product name…" value="${S.search}" id="inv-search">
      <select class="sel" id="supplier-filter">
        <option value="all">All Suppliers</option>
        ${suppliers.map(s=>`<option value="${s}"${S.supplierFilter===s?' selected':''}>${s} (${supplierCounts[s]})</option>`).join('')}
      </select>
      <select class="sel" id="cat-filter">
        <option value="all">All Categories</option>
        ${cats.map(c=>`<option value="${c}"${S.catFilter===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <select class="sel" id="status-filter">
        <option value="all">All Status</option>
        <option value="critical"${S.statusFilter==='critical'?' selected':''}>Critical</option>
        <option value="warning"${S.statusFilter==='warning'?' selected':''}>Warning</option>
        <option value="healthy"${S.statusFilter==='healthy'?' selected':''}>Healthy</option>
        <option value="discontinued"${S.statusFilter==='discontinued'?' selected':''}>Discontinued</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th></th><th>Image</th><th>SKU</th><th>Product</th>
          <th style="text-align:right">Current</th>
          <th style="text-align:right">Allocated</th>
          <th>Available / Level</th>
          <th style="text-align:right">Par Level</th>
          <th>Supplier</th>
          <th>Action</th>
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="10"><div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">No products match filters</div></div></td></tr>`}</tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pg-info">Showing ${prods.length} of ${DB.products.length} products</span>
      <div class="pg-btns"><div class="pg-btn act">1</div></div>
    </div>
  </div>`;
}

function renderPOs(){
  // Kanban View - Exclude cancelled orders
  if (S.poView === 'kanban') {
    const draft = DB.pos.filter(p => p.status === 'draft');
    const sent = DB.pos.filter(p => p.status === 'sent');
    const inTransit = DB.pos.filter(p => p.status === 'in_transit');
    const received = DB.pos.filter(p => p.status === 'fully_received');

    const renderPOCard = (po) => {
      const totalOrdered = po.items.reduce((sum, item) => sum + item.ordered, 0);
      const totalReceived = po.items.reduce((sum, item) => sum + item.received, 0);
      const daysUntilETA = Math.ceil((new Date(po.exp) - new Date()) / (1000 * 60 * 60 * 24));
      const isOverdue = daysUntilETA < 0 && po.status === 'in_transit';
      const etaColor = isOverdue ? 'var(--critical)' : daysUntilETA <= 3 ? 'var(--warning)' : 'var(--text-tertiary)';

      let actionButton = '';
      if (po.status === 'draft') {
        actionButton = `<button class="btn btn-sm btn-primary" onclick="advancePO('${po.id}',event)" style="font-size:11px;padding:4px 8px">Send to Supplier</button>`;
      } else if (po.status === 'sent') {
        actionButton = `<button class="btn btn-sm btn-primary" onclick="advancePO('${po.id}',event)" style="font-size:11px;padding:4px 8px">Mark In-Transit</button>`;
      } else if (po.status === 'in_transit') {
        actionButton = `<button class="btn btn-sm btn-primary" onclick="receiveFromPO('${po.id}',event)" style="font-size:11px;padding:4px 8px">Receive Stock</button>`;
      }

      return `<div class="kanban-card" onclick="showPODetail('${po.id}')">
        <div class="job-number">${po.id}</div>
        <div class="job-project">${po.supplier}</div>
        <div class="job-customer" style="font-family:var(--font-mono);font-size:10px">${po.contact}</div>
        <div class="job-meta">
          <div class="job-meta-item">
            <span>📅</span>
            <span class="job-meta-label">Date:</span>
            <span>${fmtDate(po.date)}</span>
          </div>
          <div class="job-meta-item">
            <span>📦</span>
            <span class="job-meta-label">Items:</span>
            <span>${po.items.length} lines</span>
          </div>
          <div class="job-meta-item">
            <span>🚚</span>
            <span class="job-meta-label">ETA:</span>
            <span style="color:${etaColor}">${fmtDate(po.exp)}${isOverdue ? ' (Late)' : ''}</span>
          </div>
          ${po.status === 'in_transit' || po.status === 'fully_received' ? `
          <div class="job-meta-item">
            <span>✓</span>
            <span class="job-meta-label">Progress:</span>
            <span>${totalReceived}/${totalOrdered}</span>
          </div>` : ''}
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-subtle);display:flex;gap:6px;justify-content:space-between">
          <button class="btn btn-sm" onclick="cancelPO('${po.id}',event)" style="color:var(--critical);font-size:11px;padding:4px 8px">Cancel</button>
          <div style="display:flex;gap:6px">${actionButton}</div>
        </div>
      </div>`;
    };

    return `<div style="margin-bottom:14px">
      <div class="toolbar">
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn ${S.poView==='kanban'?'btn-primary':''}" onclick="S.poView='kanban';renderContent()">Kanban</button>
          <button class="btn ${S.poView==='list'?'btn-primary':''}" onclick="S.poView='list';renderContent()">List</button>
        </div>
      </div>
    </div>
    <div class="kanban-board">
      <div class="kanban-column draft">
        <div class="kanban-header">
          <div class="kanban-title">
            <span>📝 Draft</span>
            <span class="kanban-count">${draft.length}</span>
          </div>
        </div>
        <div class="kanban-cards">
          ${draft.length ? draft.map(renderPOCard).join('') : '<div class="empty"><div class="empty-txt">No draft orders</div></div>'}
        </div>
      </div>

      <div class="kanban-column sent">
        <div class="kanban-header">
          <div class="kanban-title">
            <span>📤 Sent to Supplier</span>
            <span class="kanban-count">${sent.length}</span>
          </div>
        </div>
        <div class="kanban-cards">
          ${sent.length ? sent.map(renderPOCard).join('') : '<div class="empty"><div class="empty-txt">No sent orders</div></div>'}
        </div>
      </div>

      <div class="kanban-column in-transit">
        <div class="kanban-header">
          <div class="kanban-title">
            <span>🚚 In Transit</span>
            <span class="kanban-count">${inTransit.length}</span>
          </div>
        </div>
        <div class="kanban-cards">
          ${inTransit.length ? inTransit.map(renderPOCard).join('') : '<div class="empty"><div class="empty-txt">No orders in transit</div></div>'}
        </div>
      </div>

      <div class="kanban-column received">
        <div class="kanban-header">
          <div class="kanban-title">
            <span>✅ Received</span>
            <span class="kanban-count">${received.length}</span>
          </div>
        </div>
        <div class="kanban-cards">
          ${received.length ? received.map(renderPOCard).join('') : '<div class="empty"><div class="empty-txt">No received orders</div></div>'}
        </div>
      </div>
    </div>`;
  }

  // List View - Include all statuses with filter
  let pos = DB.pos;

function renderJobOrders(){
  const ongoing = DB.jobOrders.filter(j => j.status === 'ongoing');
  const upcoming = DB.jobOrders.filter(j => j.status === 'upcoming');
  const completed = DB.jobOrders.filter(j => j.status === 'completed');

  const renderCard = (job) => {
    const daysUntilDue = Math.ceil((new Date(job.due_date) - new Date()) / (1000 * 60 * 60 * 24));
    const isOverdue = daysUntilDue < 0;
    const dueDateColor = isOverdue ? 'var(--critical)' : daysUntilDue <= 7 ? 'var(--warning)' : 'var(--text-tertiary)';

    // Status change buttons based on current status
    let statusButtons = '';
    if (job.status === 'upcoming') {
      statusButtons = `<button class="btn btn-sm btn-primary" onclick="changeJobStatus('${job.job_number}', 'ongoing', event)" style="font-size:11px;padding:4px 8px">Start Job</button>`;
    } else if (job.status === 'ongoing') {
      statusButtons = `
        <button class="btn btn-sm" onclick="changeJobStatus('${job.job_number}', 'upcoming', event)" style="font-size:10px;padding:3px 6px">← Back</button>
        <button class="btn btn-sm btn-primary" onclick="changeJobStatus('${job.job_number}', 'completed', event)" style="font-size:11px;padding:4px 8px">Complete</button>
      `;
    } else if (job.status === 'completed') {
      statusButtons = `<button class="btn btn-sm" onclick="changeJobStatus('${job.job_number}', 'ongoing', event)" style="font-size:10px;padding:3px 6px">← Reopen</button>`;
    }

    return `<div class="kanban-card" onclick="showJobDetail('${job.job_number}')">
      <div class="job-number">${job.job_number}</div>
      <div class="job-project">${job.project_name}</div>
      <div class="job-customer">${job.customer_name}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span class="job-priority ${job.priority}">${job.priority}</span>
        ${job.total_value ? `<span class="job-value">RM ${job.total_value.toLocaleString()}</span>` : ''}
      </div>
      <div class="job-meta">
        <div class="job-meta-item">
          <span>📅</span>
          <span class="job-meta-label">Due:</span>
          <span style="color:${dueDateColor}">${fmtDate(job.due_date)}${isOverdue ? ' (Overdue)' : ''}</span>
        </div>
        ${job.start_date ? `<div class="job-meta-item">
          <span>▶</span>
          <span class="job-meta-label">Started:</span>
          <span>${fmtDate(job.start_date)}</span>
        </div>` : ''}
        ${job.completion_date ? `<div class="job-meta-item">
          <span>✓</span>
          <span class="job-meta-label">Completed:</span>
          <span>${fmtDate(job.completion_date)}</span>
        </div>` : ''}
        <div class="job-meta-item">
          <span>📦</span>
          <span class="job-meta-label">Materials:</span>
          <span>${job.materials.length} items</span>
        </div>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-subtle);display:flex;gap:6px;justify-content:space-between">
        <button class="btn btn-sm" onclick="deleteJobOrder('${job.job_number}',event)" style="color:var(--critical);font-size:11px;padding:4px 8px">Delete</button>
        <div style="display:flex;gap:6px">${statusButtons}</div>
      </div>
    </div>`;
  };

  return `<div class="kanban-board">
    <div class="kanban-column upcoming">
      <div class="kanban-header">
        <div class="kanban-title">
          <span>📋 Upcoming</span>
          <span class="kanban-count">${upcoming.length}</span>
        </div>
      </div>
      <div class="kanban-cards">
        ${upcoming.length ? upcoming.map(renderCard).join('') : '<div class="empty"><div class="empty-txt">No upcoming jobs</div></div>'}
      </div>
    </div>

    <div class="kanban-column ongoing">
      <div class="kanban-header">
        <div class="kanban-title">
          <span>🔨 Ongoing</span>
          <span class="kanban-count">${ongoing.length}</span>
        </div>
      </div>
      <div class="kanban-cards">
        ${ongoing.length ? ongoing.map(renderCard).join('') : '<div class="empty"><div class="empty-txt">No ongoing jobs</div></div>'}
      </div>
    </div>

    <div class="kanban-column completed">
      <div class="kanban-header">
        <div class="kanban-title">
          <span>✓ Completed</span>
          <span class="kanban-count">${completed.length}</span>
        </div>
      </div>
      <div class="kanban-cards">
        ${completed.length ? completed.map(renderCard).join('') : '<div class="empty"><div class="empty-txt">No completed jobs</div></div>'}
      </div>
    </div>
  </div>`;
}

function toggleReqItems(reqId, event) {
  event.stopPropagation();
  const itemsRow = document.getElementById(`req-items-${reqId}`);
  const arrow = document.getElementById(`req-arrow-${reqId}`);

  if (itemsRow.style.display === 'none') {
    itemsRow.style.display = 'table-row';
    arrow.style.transform = 'rotate(180deg)';
  } else {
    itemsRow.style.display = 'none';
    arrow.style.transform = 'rotate(0deg)';
  }
}

function togglePOItems(poId, event) {
  event.stopPropagation();
  const itemsRow = document.getElementById(`po-items-${poId}`);
  const arrow = document.getElementById(`po-arrow-${poId}`);

  if (itemsRow && arrow) {
    if (itemsRow.style.display === 'none') {
      itemsRow.style.display = 'table-row';
      arrow.style.transform = 'rotate(180deg)';
    } else {
      itemsRow.style.display = 'none';
      arrow.style.transform = 'rotate(0deg)';
    }
  }
}

function toggleReceivingItems(poId, event) {
  event.stopPropagation();
  const itemsDiv = document.getElementById(`rcv-items-${poId}`);
  const arrow = document.getElementById(`rcv-arrow-${poId}`);

  if (itemsDiv && arrow) {
    if (itemsDiv.style.display === 'none') {
      itemsDiv.style.display = 'block';
      arrow.style.transform = 'rotate(180deg)';
    } else {
      itemsDiv.style.display = 'none';
      arrow.style.transform = 'rotate(0deg)';
    }
  }
}

function renderSlowMovingReport(){
  if(!S.slowMovingDays) S.slowMovingDays = 30;

  const cutoffDate = new Date(Date.now() - S.slowMovingDays*24*60*60*1000);

  const slowMoving = DB.products.filter(p=>{
    const lastTransaction = DB.transactions
      .filter(t=>t.sku===p.sku)
      .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

    if(!lastTransaction) return true;
    return new Date(lastTransaction.date) < cutoffDate;
  });

  const rows = slowMoving.map(p=>{
    const lastTrans = DB.transactions
      .filter(t=>t.sku===p.sku)
      .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

    const daysSinceMovement = lastTrans
      ? Math.floor((Date.now() - new Date(lastTrans.date))/(24*60*60*1000))
      : 999;

    return `<tr>
      <td class="td-sku">${p.sku}</td>
      <td>${p.name}</td>
      <td>${p.category}</td>
      <td class="td-center">${fmtQty(p.current, p.uom)}</td>
      <td class="td-center"><span style="color:var(--warning);font-weight:600">${daysSinceMovement > 365 ? '365+' : daysSinceMovement}</span></td>
      <td>${lastTrans ? fmtDate(lastTrans.date) : 'Never'}</td>
      <td>${p.supplier}</td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <div class="card-header">
      <span class="card-title">Slow-Moving Stock Report</span>
      <div>
        <button class="btn btn-sm" onclick="exportToExcel('slow-moving')">📥 Download Excel</button>
        <button class="btn btn-sm" onclick="printReport()">🖨️ Print Report</button>
      </div>

      <button class="btn btn-sm ${S.slowMovingDays===30?'btn-primary':''}" onclick="S.slowMovingDays=30;navigate('reports')">30 days</button>
      <button class="btn btn-sm ${S.slowMovingDays===60?'btn-primary':''}" onclick="S.slowMovingDays=60;navigate('reports')">60 days</button>
      <button class="btn btn-sm ${S.slowMovingDays===90?'btn-primary':''}" onclick="S.slowMovingDays=90;navigate('reports')">90 days</button>
    </div>
    <div class="stat-card warning" style="margin-bottom:20px">
      <div class="stat-label">Slow-Moving Items (${S.slowMovingDays}+ days)</div>
      <div class="stat-value">${slowMoving.length}</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>SKU</th><th>Product</th><th>Category</th>
          <th style="text-align:center">Current Stock</th>
          <th style="text-align:center">Days Since Movement</th>
          <th>Last Transaction</th>
          <th>Supplier</th>
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="7"><div class="empty"><div class="empty-icon">✓</div><div class="empty-txt">All items have recent movement</div></div></td></tr>`}</tbody>
      </table>

  </div>`;

function createPOFromProduct(sku){
  const product = DB.products.find(p=>p.sku===sku);
  if(!product) return;

  const avail = available(product);
  const orderQty = Math.max(0, product.par - avail);

  S.newPO = {
    supplier: product.supplier,
    contact: '',
    exp: new Date(Date.now() + product.lead*24*60*60*1000).toISOString().split('T')[0],
    items: [{
      sku: product.sku,
      name: product.name,
      uom: product.uom,
      ordered: orderQty,
      received: 0
    }]
  };

  navigate('purchase-orders');
  setTimeout(() => showCreatePO(), 100);
}

function showModal(html){
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" id="modal-overlay">${html}</div>`;
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)hideModal();});
}
function hideModal(){document.getElementById('modal-root').innerHTML='';}

async function changeJobStatus(jobNumber, newStatus, event) {
  event.stopPropagation(); // Prevent card click event

  try {
    const response = await fetch(`/api/job-orders/${jobNumber}/status`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({ status: newStatus })
    });

    if (response.ok) {
      await loadData(); // Reload data to refresh the kanban board
      renderContent(); // Re-render the current view
    } else {
      const error = await response.json();
      alert('Failed to update job status: ' + (error.error || 'Unknown error'));
    }
  } catch (error) {
    console.error('Error updating job status:', error);
    alert('Failed to update job status');
  }
}

async function cancelPO(poNumber, event) {
  event.stopPropagation();

  if (!confirm(`Are you sure you want to cancel Purchase Order ${poNumber}?\n\nYou can restore it later from the List view.`)) {
    return;
  }

  try {
    const response = await fetch(`/api/purchase-orders/${poNumber}/status`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({ status: 'cancelled' })
    });

    if (response.ok) {

function getProductLabel(sku) {
  const prod = DB.products.find(p => p.sku === sku);
  if (!prod) return '';
  return `${prod.sku} — ${prod.name} (Avail: ${available(prod)} ${prod.uom})`;
}

function searchJobProduct(index, query) {
  const dropdown = document.getElementById(`job-dropdown-${index}`);
  if (!dropdown) return;

  if (!query || query.length < 1) {
    showJobProductDropdown(index, '');
    return;
  }

  const searchTerm = query.toLowerCase();
  const filtered = DB.products.filter(p => {
    return p.sku.toLowerCase().includes(searchTerm) ||
           p.name.toLowerCase().includes(searchTerm);
  });

  if (filtered.length === 0) {
    dropdown.innerHTML = '<div style="padding:12px;color:var(--text-tertiary);text-align:center">No products found</div>';
    dropdown.style.display = 'block';
    return;
  }

  const items = filtered.slice(0, 10).map(p => {
    return `<div class="product-dropdown-item" onclick="selectJobProduct(${index}, '${p.sku}')" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border-dim)" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'">
      <div style="font-weight:500;color:var(--text-primary)">${p.sku}</div>
      <div style="font-size:12px;color:var(--text-secondary)">${p.name}</div>
      <div style="font-size:11px;color:var(--text-tertiary)">Available: ${available(p)} ${p.uom}</div>
    </div>`;
  }).join('');

  dropdown.innerHTML = items;
  dropdown.style.display = 'block';
}

function showJobProductDropdown(index, currentValue) {
  searchJobProduct(index, currentValue);
}

function selectJobProduct(index, sku) {
  const input = document.getElementById(`job-mat-sku-${index}`);
  const dropdown = document.getElementById(`job-dropdown-${index}`);

  if (input) {
    input.value = getProductLabel(sku);
    input.setAttribute('data-sku', sku);
  }

  if (dropdown) {
    dropdown.style.display = 'none';
  }

  // Update the material in state
  S.newJobMaterials[index].sku = sku;

  // Auto-add new row if this is the last row and has a product selected
  if (index === S.newJobMaterials.length - 1 && sku) {
    addJobMaterial();
  }

  // Focus on quantity field
  setTimeout(() => {
    const qtyInput = document.getElementById(`job-mat-qty-${index}`);
    if (qtyInput) qtyInput.focus();
  }, 100);
}

function closeAllJobDropdowns(e) {
  // Close all dropdowns unless clicking on a search input or dropdown
  if (!e.target.classList.contains('job-product-search') &&
      !e.target.closest('.product-dropdown')) {
    document.querySelectorAll('.product-dropdown').forEach(d => d.style.display = 'none');
  }
}

function addJobMaterial(){
  S.newJobMaterials.push({sku:'',qty:''});

  // Store current form values
  const materialValues = S.newJobMaterials.map((item, i) => {
    const skuInput = document.getElementById(`job-mat-sku-${i}`);
    const qtyInput = document.getElementById(`job-mat-qty-${i}`);
    return {
      sku: skuInput ? skuInput.getAttribute('data-sku') || '' : item.sku,
      qty: qtyInput ? qtyInput.value : item.qty
    };

  // Update state with preserved values

  // Re-render only the materials table instead of whole modal
  const tbody = document.getElementById('job-materials');

    const materialRows = S.newJobMaterials.map((item,i)=>{

async function saveJobOrder(){
  const customer_name = document.getElementById('job-customer').value.trim();
  const project_name = document.getElementById('job-project').value.trim();
  const order_date = document.getElementById('job-order-date').value;
  const due_date = document.getElementById('job-due-date').value;

  if(!customer_name || !project_name || !due_date){
    alert('Please fill in all required fields (Customer Name, Project Name, Due Date)');
    return;
  }

  // Get materials with names
  const materials = S.newJobMaterials.filter(m=>m.sku && m.qty).map(m=>{
    const prod = DB.products.find(p=>p.sku===m.sku);
    return {
      sku: m.sku,
      name: prod?.name || m.sku,
      quantity: parseFloat(m.qty)
    };
  });

  if(materials.length === 0){
    alert('Please add at least one material');
    return;
  }

  const jobData = {
    customer_name,
    project_name,
    description: document.getElementById('job-description').value,
    order_date,
    due_date,
    priority: document.getElementById('job-priority').value,
    location: document.getElementById('job-location').value,
    contact_person: document.getElementById('job-contact').value,
    contact_phone: document.getElementById('job-phone').value,
    total_value: parseFloat(document.getElementById('job-value').value) || 0,
    notes: document.getElementById('job-notes').value,
    materials,
    user_id: S.user.id
  };

  try {
    const response = await fetch('/api/job-orders', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify(jobData)
    });

    if(response.ok){
      const result = await response.json();
      alert(`✅ Job Order created successfully!\n\nJob Number: ${result.job_number}\nRequisition: ${result.req_number}\n\nA requisition has been automatically created for the materials.`);
      S.newJobMaterials = [{sku:'',qty:''}];
      await loadData();
      hideModal();
      navigate('job-orders');
    } else {
      const error = await response.json();
      alert('Failed to create job order: ' + (error.error || 'Unknown error'));
    }
  } catch(error){
    console.error('Error creating job order:', error);
    alert('Failed to create job order');
  }
}

async function onSupplierChange(supplierId){
  S.selectedSupplierId = supplierId;

  if(!supplierId) {
    S.supplierProducts = [];
    renderPOModal();
    return;
  }

  // Load products for selected supplier
  try {
    const response = await fetch(`/api/suppliers/${supplierId}/products`);
    S.supplierProducts = await response.json();
  } catch(err) {
    console.error('Error loading supplier products:', err);
    S.supplierProducts = [];
  }

  // Auto-populate supplier phone and calculate expected delivery
  const supplier = S.suppliers.find(s => s.id == supplierId);
  if(supplier) {
    document.getElementById('po-contact').value = supplier.phone || '';

    // Calculate expected delivery date based on lead time
    const today = new Date();
    const deliveryDate = new Date(today.getTime() + (supplier.lead_time_days || 7) * 24 * 60 * 60 * 1000);
    document.getElementById('po-exp').value = deliveryDate.toISOString().split('T')[0];
  }

  renderPOModal();
}

async function savePO(status){
  if(!S.selectedSupplierId) {
    alert('Please select a supplier first');
    return;
  }

  const supplier = S.suppliers.find(s => s.id == S.selectedSupplierId);
  if(!supplier) {
    alert('Supplier not found');
    return;
  }

  const contact = document.getElementById('po-contact').value;
  const date = document.getElementById('po-date').value;
  const exp = document.getElementById('po-exp').value;
  const notes = document.getElementById('po-notes').value;

  const items = S.newPOItems.filter(i=>i.sku && i.qty).map(i=>{
    const prod = S.supplierProducts.find(p=>p.sku===i.sku);
    return {
      sku: i.sku,
      name: prod?.name || i.sku,
      ordered: parseFloat(i.qty) || 0,
      received: 0,
      eta: i.eta
    };
  });

  if(items.length === 0) {
    alert('Please add at least one product');
    return;
  }

  try {
    const response = await fetch('/api/purchase-orders', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        supplier: supplier.name,
        contact,
        date,
        exp,
        status,
        notes,
        items
      })
    });

    if(!response.ok) {
      throw new Error('Failed to create purchase order');
    }

    await loadData();
    hideModal();
    navigate('purchase-orders');
  } catch(err) {
    console.error('Error saving PO:', err);
    alert('Failed to create purchase order');
  }
}

const pinyinMap = {
  '加': 'jia', '尼': 'ni', '兴': 'xing',
  '厚': 'hou', '华': 'hua',
  '好': 'hao', '莱': 'lai', '誉': 'yu',
  '迈': 'mai', '比': 'bi', '克': 'ke'
};

function chineseToPinyin(text) {
  let result = '';
  for (let char of text) {
    result += pinyinMap[char] || char;
  }
  return result;
}

function generateSKUPrefix(supplierName) {
  if (!supplierName) return '';
  const hasChinese = /[\u4e00-\u9fa5]/.test(supplierName);
  if (hasChinese) {
    const pinyin = chineseToPinyin(supplierName);
    return pinyin.substring(0, 4).toUpperCase();
  } else {
    return supplierName.replace(/\s+/g, '').substring(0, 4).toUpperCase();
  }
}

function generateSKU() {
  const supplier = document.getElementById('np-supplier').value;
  if (!supplier) {
    alert('Please select a supplier first');
    return;
  }
  const prefix = generateSKUPrefix(supplier);
  const code = Math.floor(1000 + Math.random() * 9000);
  document.getElementById('np-sku').value = `${prefix}-${code}`;
  validateSKU();
}

async function validateSKU() {
  const sku = document.getElementById('np-sku').value.trim();
  const validationDiv = document.getElementById('sku-validation');
  if (!sku) {
    validationDiv.innerHTML = '';
    return;
  }
  const exists = DB.products.find(p => p.sku === sku);
  if (exists) {
    validationDiv.innerHTML = '<span style="color:var(--critical)">✗ SKU already exists</span>';
    return false;
  } else {
    validationDiv.innerHTML = '<span style="color:var(--healthy)">✓ SKU available</span>';
    return true;
  }
}

async function saveProduct(){
  const sku = document.getElementById('np-sku').value.trim();
  const supplier = document.getElementById('np-supplier').value;

  if(!supplier){alert('Please select a supplier');return;}
  if(!sku){alert('SKU is required');return;}
  if(DB.products.find(p=>p.sku===sku)){alert('SKU already exists');return;}

  let imageUrl = '/images/default-product.svg';
  const imageFile = document.getElementById('np-image').files[0];
  if(imageFile){
    imageUrl = await uploadImage(imageFile);
  }

  const baseProduct = {
    sku,
    name:document.getElementById('np-name').value,
    cat:document.getElementById('np-cat').value,
    sub:document.getElementById('np-sub').value,
    uom:document.getElementById('np-uom').value,
    rack:document.getElementById('np-rack').value,
    current:parseFloat(document.getElementById('np-stock').value)||0,
    allocated:0,
    par:parseFloat(document.getElementById('np-par').value)||0,
    reorder:parseFloat(document.getElementById('np-reorder').value)||0,
    lead:parseInt(document.getElementById('np-lead').value)||30,
    supplier,
    status:'active',
    image_url:imageUrl
  };

  try {
    // Create base product
    await fetch('/api/products', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify(baseProduct)
    });

    // Check if variants are enabled
    const hasVariants = document.getElementById('np-has-variant').checked;
    if (hasVariants) {
      const variantList = document.getElementById('variant-list');
      const variantRows = variantList.children;

      for (let i = 0; i < variantRows.length; i++) {
        const row = variantRows[i];
        const id = row.id.replace('variant-row-', '');
        const variantName = document.getElementById(`variant-name-${id}`).value.trim();
        const variantSKU = document.getElementById(`variant-sku-${id}`).value.trim();
        const variantStock = parseFloat(document.getElementById(`variant-stock-${id}`).value) || 0;

        if (variantName && variantSKU) {
          // Check if variant SKU already exists
          if (DB.products.find(p => p.sku === variantSKU)) {
            alert(`Variant SKU ${variantSKU} already exists`);
            continue;
          }

          const variantProduct = {
            ...baseProduct,
            sku: variantSKU,
            name: `${baseProduct.name} - ${variantName}`,
            current: variantStock
          };

          await fetch('/api/products', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify(variantProduct)
          });
        }
      }
    }

    await loadData();
    hideModal();
    renderContent();
  } catch (error) {
    console.error('Error saving product:', error);
    alert('Failed to save product');
  }
}

async function uploadImage(file){

  formData.append('image', file);
  const response = await fetch('/api/upload-image', {
    method: 'POST',
    body: formData
  });
  const data = await response.json();
  return data.url;
}

function handleImagePreview(input, previewId){

    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function advancePO(poId, e){
  e.stopPropagation();
  const po = DB.pos.find(p=>p.id===poId);
  if(!po) return;
  const next = {draft:'sent',sent:'in_transit'};
  const newStatus = next[po.status];
  if(!newStatus) return;

  try {
    const response = await fetch(`/api/purchase-orders/${poId}/status`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({ status: newStatus })
    });

    if (response.ok) {
      await loadData();
      renderContent();
    } else {
      const contentType = response.headers.get('content-type');
      if (contentType && contentType.includes('application/json')) {
        const error = await response.json();
        alert('Failed to update purchase order status: ' + (error.error || 'Unknown error'));
      } else {
        const text = await response.text();
        console.error('Server error:', text);
        alert('Failed to update purchase order status. Please check if the server is running.');
      }
    }
  } catch (error) {
    console.error('Error updating purchase order status:', error);
    alert('Failed to update purchase order status. Network error or server not running.');

function calcVariance(i, expected){
  const input = document.getElementById(`grn-qty-${i}`);
  const actual = parseFloat(input?.value)||0;
  const varEl = document.getElementById(`grn-var-${i}`);
  if(!varEl) return;
  const diff = actual - expected;
  varEl.className = diff===0?'var-ok':diff<0?'var-short':'var-over';
  varEl.textContent = diff===0?'✓ OK':`${diff>0?'+':''}${diff}`;
}

function completeGRN(poId){
  const po = DB.pos.find(p=>p.id===poId);
  if(!po) return;
  po.items.forEach((item,i)=>{
    const actual = parseFloat(document.getElementById(`grn-qty-${i}`)?.value)||item.ordered;
    item.received = actual;
    const prod = DB.products.find(p=>p.sku===item.sku);
    if(prod){
      const before = prod.current;
      prod.current += actual;
      DB.transactions.push({id:`TXN-${String(DB.transactions.length+1).padStart(3,'0')}`,date:'2024-03-10 09:00',type:'purchase_receipt',sku:item.sku,name:item.name,qty:actual,before,after:prod.current,ref:`GRN-${poId}`,user:'Current User'});
    }
  });
  po.status = 'fully_received';
  S.grnPO = null;
  alert(`GRN completed. Stock levels updated for ${po.items.length} product(s).`);
  navigate('inventory');
}

function approveReq(reqId, e){
  e.stopPropagation();
  const r = DB.requisitions.find(x=>x.id===reqId);
  if(r) r.status='approved';
  renderContent();
}

function issueReq(reqId, e){
  e.stopPropagation();
  const r = DB.requisitions.find(x=>x.id===reqId);
  if(!r) return;
  r.items.forEach(item=>{
    const prod = DB.products.find(p=>p.sku===item.sku);
    if(prod){
      const before=prod.current;
      prod.current -= item.req;
      item.issued = item.req;
      DB.transactions.push({id:`TXN-${String(DB.transactions.length+1).padStart(3,'0')}`,date:'2024-03-10 10:00',type:'production_issue',sku:item.sku,name:item.name,qty:-item.req,before,after:prod.current,ref:r.id,user:'Warehouse Staff'});
    }
  });
  r.status='issued';
  renderContent();
}

  const availSearch = document.getElementById('avail-search');

function renderAvailResults(){
  S.availSearch = document.getElementById('avail-search')?.value||S.availSearch;
  // Re-render using S.availSearch
  const tmpSearch = S.availSearch;
  if(tmpSearch.length<2) return '';
  const q=tmpSearch.toLowerCase();
  const found=DB.products.filter(p=>p.sku.toLowerCase().includes(q)||p.name.toLowerCase().includes(q));
  if(!found.length) return `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">No products found</div></div>`;
  return found.map(p=>{
    const avail=available(p);const s=stockStatus(p);
    const transit=inTransitForSKU(p.sku);
    const transitHTML=transit.length?transit.map(t=>`<div style="font-family:var(--font-mono);font-size:10px;color:var(--transit);margin-top:4px">📦 ${t.po}: +${t.ordered} ${p.uom} · ETA ${fmtDate(t.eta)}</div>`).join(''):'<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:4px">No incoming orders</div>';
    return `<div class="avail-result">
      <div class="avail-head">
        <span class="sdot ${s}"></span>
        <div><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:700">${p.sku}</div><div style="font-size:13px;font-weight:600;margin-top:1px">${p.name}</div></div>
        <div style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)">📍 Rack ${p.rack} · Lead ${p.lead}d</div>
      </div>
      <div class="avail-metrics">
        <div class="avail-metric"><div class="aml">Current</div><div class="amv" style="color:${s==='critical'?'var(--critical)':s==='warning'?'var(--warning)':'var(--healthy)'}">${p.current}<span class="amu">${p.uom}</span></div></div>
        <div class="avail-metric"><div class="aml">Allocated</div><div class="amv" style="color:var(--warning)">${p.allocated}<span class="amu">${p.uom}</span></div></div>
        <div class="avail-metric"><div class="aml">Available</div><div class="amv" style="color:${avail>0?'var(--healthy)':'var(--critical)'}">${avail}<span class="amu">${p.uom}</span></div></div>
        <div class="avail-metric"><div class="aml">Par Level</div><div class="amv" style="color:var(--text-secondary)">${p.par}<span class="amu">${p.uom}</span></div></div>
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border-subtle);">${transitHTML}</div>
    </div>`;
  }).join('');
}

          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:12px" id="login-btn">Sign In</button>
        </form>
        <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border-default);font-size:12px;color:var(--text-tertiary);text-align:center">
          Default credentials: <code style="background:var(--bg-elevated);padding:2px 6px;border-radius:4px">admin / admin123</code>
        </div>
      </div>
    </div>
  `;
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  const loginBtn = document.getElementById('login-btn');
  const errorDiv = document.getElementById('login-error');

  loginBtn.disabled = true;
  loginBtn.textContent = 'Signing in...';
  errorDiv.style.display = 'none';

  const result = await login(username, password);

  if (result.success) {
    await initApp();
  } else {
    errorDiv.textContent = result.error;
    errorDiv.style.display = 'block';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

async function initApp() {
  // Restore the main app structure
  const appContainer = document.querySelector('.app');
  if (!appContainer) return;

  appContainer.innerHTML = `
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">Aluminium<span>King</span></div>
        <div class="logo-sub">Inventory Management System</div>
      </div>
      <div id="nav-content"></div>
      <div class="sidebar-footer" id="sidebar-footer"></div>
    </nav>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <div>
          <div class="page-title" id="page-title">Dashboard</div>
        </div>
        <div class="topbar-right" id="topbar-actions"></div>
      </header>
      <main class="content" id="content"></main>
    </div>

    <!-- MODAL ROOT -->
    <div id="modal-root"></div>
  `;

  // Small delay to ensure DOM is ready
  await new Promise(resolve => setTimeout(resolve, 10));

  await loadData();
  renderNav();
  navigate('dashboard');
}

async function init() {
  const authenticated = await checkAuth();
  if (authenticated) {
    await initApp();
  } else {
    showLoginScreen();
  }
}

init();
</script>

</html>
