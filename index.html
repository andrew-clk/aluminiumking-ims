<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AluminiumKing IMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:#08090B;--bg-surface:#0F1115;--bg-elevated:#161921;--bg-interactive:#1E2228;--bg-hover:#242930;
  --border-subtle:#1A1D24;--border-default:#252930;--border-strong:#353B46;
  --text-primary:#E2E4E9;--text-secondary:#8A93A4;--text-tertiary:#4D5666;
  --accent:#F5A623;--accent-dim:rgba(245,166,35,0.1);--accent-glow:rgba(245,166,35,0.2);
  --critical:#FF4040;--critical-dim:rgba(255,64,64,0.1);--critical-border:rgba(255,64,64,0.3);
  --warning:#FFB800;--warning-dim:rgba(255,184,0,0.1);--warning-border:rgba(255,184,0,0.3);
  --healthy:#00D080;--healthy-dim:rgba(0,208,128,0.1);--healthy-border:rgba(0,208,128,0.3);
  --transit:#4D9EFF;--transit-dim:rgba(77,158,255,0.1);--transit-border:rgba(77,158,255,0.3);
  --font-display:'Bebas Neue',sans-serif;
  --font-condensed:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --sidebar-width:220px;--header-height:52px;--tr:150ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body);font-size:13px;line-height:1.5;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.035) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--bg-surface);border-right:1px solid var(--border-default);display:flex;flex-direction:column;overflow-y:auto;position:relative;}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border-subtle);}
.logo-mark{font-family:var(--font-display);font-size:20px;letter-spacing:0.06em;line-height:1;}
.logo-mark span{color:var(--accent);}
.logo-sub{font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-tertiary);margin-top:3px;}
.nav-section{padding:12px 0 4px;}
.nav-label{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-tertiary);padding:0 16px 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;transition:all var(--tr);border-left:2px solid transparent;color:var(--text-secondary);font-family:var(--font-condensed);font-size:13px;font-weight:500;letter-spacing:0.02em;user-select:none;}
.nav-item:hover{background:var(--bg-interactive);color:var(--text-primary);}
.nav-item.active{background:var(--accent-dim);border-left-color:var(--accent);color:var(--accent);}
.nav-icon{font-size:12px;width:14px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--critical);color:#fff;font-family:var(--font-mono);font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border-subtle);}
.user-chip{display:flex;align-items:center;gap:8px;}
.user-avatar{width:28px;height:28px;background:var(--accent);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;color:var(--bg-base);flex-shrink:0;}
.user-name{font-size:12px;font-weight:600;color:var(--text-primary);}
.user-role{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.1em;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--header-height);min-height:var(--header-height);background:var(--bg-surface);border-bottom:1px solid var(--border-default);display:flex;align-items:center;padding:0 24px;gap:12px;}
.page-title{font-family:var(--font-condensed);font-size:15px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-primary);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.content{flex:1;overflow-y:auto;padding:20px 24px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border-default);background:var(--bg-interactive);color:var(--text-secondary);font-family:var(--font-condensed);font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:all var(--tr);border-radius:2px;}
.btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-strong);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:var(--bg-base);}
.btn-primary:hover{background:#E8981A;border-color:#E8981A;color:var(--bg-base);}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-ghost:hover{background:var(--bg-interactive);border-color:var(--border-default);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-danger{border-color:var(--critical-border);color:var(--critical);background:transparent;}
.btn-danger:hover{background:var(--critical-dim);}

/* CARDS */
.card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:2px;}
.card-header{padding:12px 18px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px;}
.card-title{font-family:var(--font-condensed);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-secondary);}
.card-action{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--accent);cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;}
.card-action:hover{text-decoration:underline;}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:2px;padding:16px 18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.critical::before{background:var(--critical);}
.stat-card.warning::before{background:var(--warning);}
.stat-card.healthy::before{background:var(--healthy);}
.stat-card.transit::before{background:var(--transit);}
.stat-label{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px;}
.stat-value{font-family:var(--font-display);font-size:52px;line-height:1;letter-spacing:0.02em;}
.stat-card.critical .stat-value{color:var(--critical);}
.stat-card.warning .stat-value{color:var(--warning);}
.stat-card.healthy .stat-value{color:var(--healthy);}
.stat-card.transit .stat-value{color:var(--transit);}
.stat-desc{font-family:var(--font-condensed);font-size:11px;color:var(--text-tertiary);margin-top:3px;}

/* TABLES */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-tertiary);padding:9px 14px;text-align:left;border-bottom:1px solid var(--border-default);white-space:nowrap;}
td{padding:9px 14px;border-bottom:1px solid var(--border-subtle);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--bg-elevated);cursor:pointer;}
.td-sku{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:500;}
.td-num{font-family:var(--font-mono);font-size:12px;font-weight:700;text-align:right;}
.td-unit{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);margin-left:2px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:2px;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border:1px solid;}
.badge-critical{background:var(--critical-dim);color:var(--critical);border-color:var(--critical-border);}
.badge-warning{background:var(--warning-dim);color:var(--warning);border-color:var(--warning-border);}
.badge-healthy{background:var(--healthy-dim);color:var(--healthy);border-color:var(--healthy-border);}
.badge-transit{background:var(--transit-dim);color:var(--transit);border-color:var(--transit-border);}
.badge-draft{background:var(--bg-elevated);color:var(--text-tertiary);border-color:var(--border-default);}
.badge-sent{background:rgba(159,122,234,0.1);color:#9F7AEA;border-color:rgba(159,122,234,0.3);}
.badge-received{background:var(--healthy-dim);color:var(--healthy);border-color:var(--healthy-border);}
.badge-cancelled{background:var(--bg-elevated);color:var(--text-tertiary);border-color:var(--border-default);}
.badge-disc{background:rgba(255,64,64,0.08);color:var(--critical);border-color:var(--critical-border);}
.badge-pending{background:var(--warning-dim);color:var(--warning);border-color:var(--warning-border);}
.badge-approved{background:var(--transit-dim);color:var(--transit);border-color:var(--transit-border);}
.badge-issued{background:var(--healthy-dim);color:var(--healthy);border-color:var(--healthy-border);}
.badge-active{background:var(--healthy-dim);color:var(--healthy);border-color:var(--healthy-border);}

/* STATUS DOT */
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot.critical{background:var(--critical);box-shadow:0 0 6px var(--critical);}
.sdot.warning{background:var(--warning);}
.sdot.healthy{background:var(--healthy);}
.sdot.transit{background:var(--transit);}

/* SEARCH / FILTERS */
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border-subtle);}
.search-input{flex:1;background:var(--bg-interactive);border:1px solid var(--border-default);border-radius:2px;padding:7px 11px;color:var(--text-primary);font-family:var(--font-mono);font-size:11px;outline:none;transition:border-color var(--tr);}
.search-input::placeholder{color:var(--text-tertiary);}
.search-input:focus{border-color:var(--accent);}
.sel{background:var(--bg-interactive);border:1px solid var(--border-default);border-radius:2px;padding:7px 10px;color:var(--text-secondary);font-family:var(--font-condensed);font-size:12px;outline:none;cursor:pointer;}
.sel:focus{border-color:var(--accent);}
option{background:var(--bg-elevated);}

/* STOCK BAR */
.bar-wrap{display:flex;align-items:center;gap:8px;min-width:100px;}
.bar-track{flex:1;height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.bar-fill.critical{background:var(--critical);}
.bar-fill.warning{background:var(--warning);}
.bar-fill.healthy{background:var(--healthy);}

/* GRID */
.page{display:flex;flex-direction:column;gap:14px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.span-2{grid-column:span 2;}

/* LIST ITEMS (alerts, PO summary) */
.list-item{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border-subtle);transition:background var(--tr);}
.list-item:hover{background:var(--bg-elevated);}
.list-item:last-child{border-bottom:none;}
.li-sku{font-family:var(--font-mono);font-size:10px;color:var(--accent);min-width:90px;}
.li-name{font-size:12px;font-weight:500;color:var(--text-primary);}
.li-meta{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);}
.li-sub{font-family:var(--font-condensed);font-size:11px;color:var(--text-secondary);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px;backdrop-filter:blur(3px);}
.modal{background:var(--bg-surface);border:1px solid var(--border-strong);border-radius:2px;width:100%;max-width:700px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,0.6);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-condensed);font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
.modal-close{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:18px;line-height:1;padding:4px;}
.modal-close:hover{color:var(--text-primary);}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border-default);display:flex;align-items:center;justify-content:flex-end;gap:8px;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.span-2{grid-column:span 2;}
.form-label{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-tertiary);}
.form-input,.form-sel,.form-ta{background:var(--bg-interactive);border:1px solid var(--border-default);border-radius:2px;padding:8px 10px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color var(--tr);width:100%;}
.form-input:focus,.form-sel:focus,.form-ta:focus{border-color:var(--accent);}
.form-ta{resize:vertical;min-height:60px;}
.form-divider{grid-column:span 2;border:none;border-top:1px solid var(--border-subtle);margin:4px 0;}

/* INLINE LINE ITEMS */
.li-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.li-table th{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border-default);}
.li-table td{padding:5px 8px;border-bottom:1px solid var(--border-subtle);}
.li-table .fi{padding:4px 7px;font-size:11px;font-family:var(--font-mono);background:var(--bg-interactive);border:1px solid var(--border-default);border-radius:2px;color:var(--text-primary);width:90px;}
.li-table .fi:focus{border-color:var(--accent);outline:none;}

/* AVAIL CHECK */
.avail-result{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.avail-head{padding:12px 16px;background:var(--bg-elevated);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px;}
.avail-metrics{display:grid;grid-template-columns:repeat(4,1fr);}
.avail-metric{padding:14px 16px;border-right:1px solid var(--border-subtle);}
.avail-metric:last-child{border-right:none;}
.aml{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-tertiary);margin-bottom:4px;}
.amv{font-family:var(--font-mono);font-size:22px;font-weight:700;}
.amu{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-left:3px;}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--border-subtle);}
.pg-info{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);}
.pg-btns{display:flex;gap:4px;}
.pg-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--bg-interactive);border:1px solid var(--border-default);color:var(--text-secondary);font-family:var(--font-mono);font-size:11px;cursor:pointer;border-radius:2px;transition:all var(--tr);}
.pg-btn:hover,.pg-btn.act{background:var(--accent);border-color:var(--accent);color:var(--bg-base);}

/* REPORT CARDS */
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.report-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:2px;padding:20px;cursor:pointer;transition:all var(--tr);}
.report-card:hover{background:var(--bg-elevated);border-color:var(--accent);}
.report-icon{font-size:22px;margin-bottom:10px;}
.report-title{font-family:var(--font-condensed);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;}
.report-desc{font-size:11px;color:var(--text-secondary);line-height:1.5;}

/* TRANSACTION LOG */
.tx-receipt{color:var(--healthy);}
.tx-issue{color:var(--critical);}
.tx-adjust{color:var(--warning);}

/* GRN VARIANCE */
.var-ok{color:var(--healthy);font-family:var(--font-mono);font-size:11px;font-weight:700;}
.var-short{color:var(--critical);font-family:var(--font-mono);font-size:11px;font-weight:700;}
.var-over{color:var(--warning);font-family:var(--font-mono);font-size:11px;font-weight:700;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border-default);}
.tab{padding:10px 18px;font-family:var(--font-condensed);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--tr);}
.tab:hover{color:var(--text-secondary);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--text-tertiary);}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:0.4;}
.empty-txt{font-size:12px;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.pulse{animation:pulse 2s infinite;}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">ALUMINIUM<span>KING</span></div>
      <div class="logo-sub">Inventory Management System</div>
    </div>
    <div id="nav-content"></div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar">AK</div>
        <div>
          <div class="user-name">Admin User</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title" id="page-title">Dashboard</div>
      </div>
      <div class="topbar-right" id="topbar-actions"></div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<div id="modal-root"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const DB = {
  products: [
    {sku:'AL-650-3M',name:'Profile 650 3m',cat:'Aluminium',sub:'Profile',uom:'meter',current:5.0,allocated:2.0,par:50.0,reorder:30.0,lead:45,rack:'C-01',status:'active',supplier:'China Aluminium Co.'},
    {sku:'AL-750-6M',name:'Profile 750 6m',cat:'Aluminium',sub:'Profile',uom:'meter',current:120.0,allocated:30.0,par:80.0,reorder:50.0,lead:45,rack:'C-02',status:'active',supplier:'China Aluminium Co.'},
    {sku:'AL-500-3M',name:'Profile 500 3m',cat:'Aluminium',sub:'Profile',uom:'meter',current:85.0,allocated:20.0,par:60.0,reorder:40.0,lead:45,rack:'C-03',status:'active',supplier:'China Aluminium Co.'},
    {sku:'HG-X200',name:'Hinge Heavy Duty X-200',cat:'Hardware',sub:'Hinge',uom:'pcs',current:2,allocated:0,par:20,reorder:10,lead:30,rack:'A-12',status:'active',supplier:'Golden Hardware Co.'},
    {sku:'HG-P100',name:'Pivot Hinge P-100',cat:'Hardware',sub:'Hinge',uom:'pcs',current:12,allocated:4,par:20,reorder:10,lead:30,rack:'A-10',status:'active',supplier:'Golden Hardware Co.'},
    {sku:'TR-T500',name:'Track System T-500',cat:'Hardware',sub:'Track',uom:'pcs',current:0,allocated:0,par:10,reorder:5,lead:30,rack:'B-05',status:'active',supplier:'Golden Hardware Co.'},
    {sku:'GL-6MM-CLR',name:'Glass 6mm Clear',cat:'Glass',sub:'Clear',uom:'sqm',current:45.5,allocated:12.0,par:20.0,reorder:15.0,lead:21,rack:'D-03',status:'active',supplier:'KL Glass Sdn Bhd'},

// ─── UTILS ───────────────────────────────────────────────────────────────────

function stockStatus(p) {
  if(p.current === 0) return 'critical';
  if(p.current < p.par) return p.current < p.par * 0.5 ? 'critical' : 'warning';
  return 'healthy';
}
function available(p){return Math.max(0,p.current - p.allocated);}
function fmtQty(n,uom){return `<span class="td-num">${n%1===0?n:n.toFixed(1)}</span><span class="td-unit">${uom}</span>`;}
function fmtDate(s){if(!s)return '—';const d=new Date(s);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function poBadge(s){
  const map={draft:'badge-draft',sent:'badge-sent',in_transit:'badge-transit',partially_received:'badge-warning',fully_received:'badge-received',cancelled:'badge-cancelled'};
  const label={draft:'Draft',sent:'Sent',in_transit:'In-Transit',partially_received:'Partial',fully_received:'Received',cancelled:'Cancelled'};
  return `<span class="badge ${map[s]||'badge-draft'}">${label[s]||s}</span>`;
}
function reqBadge(s){
  const map={pending:'badge-pending',approved:'badge-approved',issued:'badge-issued',cancelled:'badge-cancelled'};
  const label={pending:'Pending',approved:'Approved',issued:'Issued',cancelled:'Cancelled'};
  return `<span class="badge ${map[s]||'badge-draft'}">${label[s]||s}</span>`;
}
function inTransitForSKU(sku){
  return DB.pos.filter(p=>p.status==='in_transit'||p.status==='sent').flatMap(p=>p.items.filter(i=>i.sku===sku).map(i=>({...i,po:p.id,eta:i.eta,supplier:p.supplier})));
}
function criticalAlerts(){return DB.products.filter(p=>stockStatus(p)==='critical');}
function warningAlerts(){return DB.products.filter(p=>stockStatus(p)==='warning');}
function inTransitPOs(){return DB.pos.filter(p=>p.status==='in_transit');}
function pendingReqs(){return DB.requisitions.filter(r=>r.status==='pending');}

  {id:'transactions',label:'Transactions',icon:'↕'},

  {id:'reports',label:'Reports',icon:'▤'},
];

function renderNav(){
  const crit = criticalAlerts().length;
  const pend = pendingReqs().length;
  const badges = {dashboard: crit+pend, 'purchase-orders': DB.pos.filter(p=>p.status==='in_transit').length};
  let html = '';
  let inSection = false;
  NAV.forEach(n=>{
    if(n.section){
      html+=`<div class="nav-section"><div class="nav-label">${n.section}</div>`;
      inSection=true;
    } else {
      if(inSection&&!n.section){/* already opened */}
      const badge = badges[n.id]?`<span class="nav-badge">${badges[n.id]}</span>`:'';
      html+=`<div class="nav-item${S.view===n.id?' active':''}" data-nav="${n.id}">
        <span class="nav-icon">${n.icon}</span>${n.label}${badge}
      </div>`;
    }
  });
  document.getElementById('nav-content').innerHTML = html;
}

function navigate(view){
  S.view=view;
  S.search='';
  S.catFilter='all';
  S.statusFilter='all';
  renderNav();
  renderTopbar();
  renderContent();
}

  const titles={dashboard:'Dashboard',inventory:'Products & Inventory','purchase-orders':'Purchase Orders',receiving:'Stock Receiving',requisitions:'Requisitions',availability:'Availability Check',transactions:'Transaction Log',reports:'Reports'};

}

function advancePO(poId, e){
  e.stopPropagation();
  const po = DB.pos.find(p=>p.id===poId);
  if(!po) return;
  const next = {draft:'sent',sent:'in_transit'};
  if(next[po.status]) po.status=next[po.status];
  renderContent();
}

function receiveFromPO(poId, e){
  e.stopPropagation();
  S.grnPO = poId;
  navigate('receiving');
}

function calcVariance(i, expected){
  const input = document.getElementById(`grn-qty-${i}`);
  const actual = parseFloat(input?.value)||0;
  const varEl = document.getElementById(`grn-var-${i}`);
  if(!varEl) return;
  const diff = actual - expected;
  varEl.className = diff===0?'var-ok':diff<0?'var-short':'var-over';
  varEl.textContent = diff===0?'✓ OK':`${diff>0?'+':''}${diff}`;
}

function completeGRN(poId){
  const po = DB.pos.find(p=>p.id===poId);
  if(!po) return;
  po.items.forEach((item,i)=>{
    const actual = parseFloat(document.getElementById(`grn-qty-${i}`)?.value)||item.ordered;
    item.received = actual;
    const prod = DB.products.find(p=>p.sku===item.sku);
    if(prod){
      const before = prod.current;
      prod.current += actual;
      DB.transactions.push({id:`TXN-${String(DB.transactions.length+1).padStart(3,'0')}`,date:'2024-03-10 09:00',type:'purchase_receipt',sku:item.sku,name:item.name,qty:actual,before,after:prod.current,ref:`GRN-${poId}`,user:'Current User'});
    }
  });
  po.status = 'fully_received';
  S.grnPO = null;
  alert(`GRN completed. Stock levels updated for ${po.items.length} product(s).`);
  navigate('inventory');
}

function approveReq(reqId, e){
  e.stopPropagation();
  const r = DB.requisitions.find(x=>x.id===reqId);
  if(r) r.status='approved';
  renderContent();
}

function issueReq(reqId, e){
  e.stopPropagation();
  const r = DB.requisitions.find(x=>x.id===reqId);
  if(!r) return;
  r.items.forEach(item=>{
    const prod = DB.products.find(p=>p.sku===item.sku);
    if(prod){
      const before=prod.current;
      prod.current -= item.req;
      item.issued = item.req;
      DB.transactions.push({id:`TXN-${String(DB.transactions.length+1).padStart(3,'0')}`,date:'2024-03-10 10:00',type:'production_issue',sku:item.sku,name:item.name,qty:-item.req,before,after:prod.current,ref:r.id,user:'Warehouse Staff'});
    }
  });
  r.status='issued';
  renderContent();
}

  // Re-render using S.availSearch
  const tmpSearch = S.availSearch;
  if(tmpSearch.length<2) return '';
  const q=tmpSearch.toLowerCase();
  const found=DB.products.filter(p=>p.sku.toLowerCase().includes(q)||p.name.toLowerCase().includes(q));
  if(!found.length) return `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">No products found</div></div>`;
  return found.map(p=>{
    const avail=available(p);const s=stockStatus(p);
    const transit=inTransitForSKU(p.sku);
    const transitHTML=transit.length?transit.map(t=>`<div style="font-family:var(--font-mono);font-size:10px;color:var(--transit);margin-top:4px">📦 ${t.po}: +${t.ordered} ${p.uom} · ETA ${fmtDate(t.eta)}</div>`).join(''):'<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:4px">No incoming orders</div>';
    return `<div class="avail-result">
      <div class="avail-head">
        <span class="sdot ${s}"></span>
        <div><div style="font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:700">${p.sku}</div><div style="font-size:13px;font-weight:600;margin-top:1px">${p.name}</div></div>
        <div style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)">📍 Rack ${p.rack} · Lead ${p.lead}d</div>
      </div>
      <div class="avail-metrics">
        <div class="avail-metric"><div class="aml">Current</div><div class="amv" style="color:${s==='critical'?'var(--critical)':s==='warning'?'var(--warning)':'var(--healthy)'}">${p.current}<span class="amu">${p.uom}</span></div></div>
        <div class="avail-metric"><div class="aml">Allocated</div><div class="amv" style="color:var(--warning)">${p.allocated}<span class="amu">${p.uom}</span></div></div>
        <div class="avail-metric"><div class="aml">Available</div><div class="amv" style="color:${avail>0?'var(--healthy)':'var(--critical)'}">${avail}<span class="amu">${p.uom}</span></div></div>
        <div class="avail-metric"><div class="aml">Par Level</div><div class="amv" style="color:var(--text-secondary)">${p.par}<span class="amu">${p.uom}</span></div></div>
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border-subtle);">${transitHTML}</div>
    </div>`;
  }).join('');
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderNav();
navigate('dashboard');
</script>
</body>
</html>
